# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - nutritec

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      # 1. Configurar Node.js
      - name: Set up Node.js version
        uses: actions/setup-node@v4 # Actualizado a la v4 que es más estable
        with:
          node-version: '22.x'

      # 2. Correr la instalación y la compilación dentro de la subcarpeta del cliente
      - name: npm install, build, and test
        run: |
          npm ci
          npm run build --if-present
        working-directory: frontend/web/client

      # 3. Subir ÚNICAMENTE la carpeta compilada (build) como el artefacto
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: frontend/web/client/build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      # 4. Descargar la carpeta build que se compiló en el paso anterior
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./build # Forzamos a que se descargue en una carpeta llamada build
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7192E6290DB84A869D394B256971E9CB }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9BC42333377244958439B96DAE1E11F2 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CD14913A98214D898659ACD01631214A }}

      # 5. Desplegar los archivos estáticos finales a Azure
      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'nutritec'
          slot-name: 'Production'
          package: ./build # Le indicamos a Azure que suba el contenido de la carpeta build